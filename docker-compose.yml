services:

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: laravel_web
    ports:
      - "80:80"
    volumes:
      - ./laravel12:/var/www/html
    depends_on:
      - db
    networks:
      - laravel

  db:
    image: mariadb:10.11
    container_name: laravel_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

volumes:
  dbdata:

networks:
  laravel: